name: Semgrep SAST

on:
  pull_request:
    branches: ['main', 'develop']
  schedule:
    - cron: '0 0 * * 1' # Cada lunes a medianoche
  push:
    branches: ['main']

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v3

      - name: Ejecutar Semgrep CI
        run: semgrep ci --config=p/default --config=p/security-audit --config=p/typescript
        env:
          # Fail pipeline si encuentra High o Criticals
          SEMGREP_RULES: p/default
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # Opcional: Generar un log para triage (artifact) en caso de warn
      - name: Generar Reporte Completo
        run: semgrep scan --config=auto --json > semgrep-report.json || true

      - uses: actions/upload-artifact@v3
        with:
          name: semgrep-report
          path: semgrep-report.json
