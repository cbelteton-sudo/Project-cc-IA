name: ci-rbac

on:
push:
pull_request:
workflow_dispatch:

jobs:
test:
runs-on: ubuntu-latest
steps:
- name: Checkout
uses: actions/checkout@v4

- name: Setup pnpm
uses: pnpm/action-setup@v4
with:
version: 8

- name: Setup Node
uses: actions/setup-node@v4
with:
node-version: '20'

- name: Install deps
run: "pnpm install --no-frozen-lockfile"

- name: Run API tests
run: "pnpm --filter api test -- --runInBand"
